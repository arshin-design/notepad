# Render Blueprint - 무료(free) 플랜 + 외부 Turso(libsql) DB 사용
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: notepad
    runtime: node
    plan: free # 무료 웹 서비스
    region: singapore # 가까운 리전 (필요 시 변경)
    buildCommand: npm run render-build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      # Turso 연결 정보 - 값은 Render 대시보드에서 직접 입력(시크릿)
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      # Prisma CLI(generate/migrate diff) 전용 더미 값.
      # 실제 런타임 연결은 위 TURSO_URL/TURSO_TOKEN(libsql 어댑터)을 사용한다.
      - key: DATABASE_URL
        value: "file:./dev.db"
      - key: NODE_VERSION
        value: "20"
